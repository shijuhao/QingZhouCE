name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Sign APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: app/build/outputs/apk/release/*.apk

      - name: Get commit history
        id: commits
        run: |
          COMMITS=$(git log -5 --format='- %s (%an)' --no-merges)
          COMMITS="${COMMITS//'%'/'%25'}"
          COMMITS="${COMMITS//$'\n'/'%0A'}"
          echo "list=$COMMITS" >> $GITHUB_OUTPUT

      - name: Get commit hash
        id: commit
        run: |
          HASH=$(git rev-parse --short HEAD)
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Send APK to bot
        if: success()
        continue-on-error: true
        env:
          BOT_SEND_TOKEN: ${{ secrets.YHCHAT_BOT_SEND_TOKEN }}
          BOT_RECV_ID: ${{ secrets.YHCHAT_BOT_RECV_ID }}
          BOT_RECV_TYPE: ${{ secrets.YHCHAT_BOT_RECV_TYPE }}
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "No APK found"
            exit 0
          fi
          
          APK_SIZE=$(stat -c%s "$APK_PATH")
          APK_NAME=$(basename "$APK_PATH")
          
          cat > /tmp/message.md << 'EOF'
          **й°єзЫЃ**: иљїжШЉCE
          **зЙИжЬђ**: ${{ steps.commit.outputs.hash }}
          **иІ¶еПСиАЕ**: ${{ github.actor }}
          **жЮДеїЇжЧґйЧі**: $(date '+%Y-%m-%d %H:%M:%S')
          
          **жЬАињСжПРдЇ§**:
          ${{ steps.commits.outputs.list }}
          
          **дЄЛиљљеЬ∞еЭА**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          
          sed -i "s|\${{ steps.commit.outputs.hash }}|${{ steps.commit.outputs.hash }}|g" /tmp/message.md
          sed -i "s|\${{ github.actor }}|${{ github.actor }}|g" /tmp/message.md
          sed -i "s|\${{ github.repository }}|${{ github.repository }}|g" /tmp/message.md
          sed -i "s|\${{ github.run_id }}|${{ github.run_id }}|g" /tmp/message.md
          
          MESSAGE=$(cat /tmp/message.md)
          
          curl -X POST "https://chat-go.jwzhd.com/open-apis/v1/bot/send?token=${BOT_SEND_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg recvId "$BOT_RECV_ID" \
              --arg recvType "$BOT_RECV_TYPE" \
              --arg text "$MESSAGE" \
              '{recvId: $recvId, recvType: $recvType, contentType: "markdown", content: { text: $text }}')"
          
          if [ "$APK_SIZE" -lt 20971520 ]; then
            UPLOAD_RESPONSE=$(curl -sS -X POST "https://chat-go.jwzhd.com/open-apis/v1/file/upload?token=${BOT_SEND_TOKEN}" \
              -F "file=@${APK_PATH};filename=${APK_NAME}")
            
            FILE_KEY=$(echo "$UPLOAD_RESPONSE" | jq -r '.data.fileKey')
            
            if [ -n "$FILE_KEY" ] && [ "$FILE_KEY" != "null" ]; then
              curl -X POST "https://chat-go.jwzhd.com/open-apis/v1/bot/send?token=${BOT_SEND_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$(jq -n \
                  --arg recvId "$BOT_RECV_ID" \
                  --arg recvType "$BOT_RECV_TYPE" \
                  --arg fileKey "$FILE_KEY" \
                  '{recvId: $recvId, recvType: $recvType, contentType: "file", content: { fileKey: $fileKey }}')"
            else
              echo "File upload failed, APK sent via link only"
            fi
          else
            echo "APK size $(($APK_SIZE / 1048576))MB >= 20MB, sent link only"
          fi