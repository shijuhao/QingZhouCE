name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          release-type: simple
          changelog-types: |
            [
              { "type": "feat", "section": "✨ 新功能", "hidden": false },
              { "type": "fix", "section": "🐛 修复", "hidden": false },
              { "type": "docs", "section": "📝 文档", "hidden": false },
              { "type": "refactor", "section": "🔧 重构", "hidden": false },
              { "type": "perf", "section": "⚡ 性能优化", "hidden": false },
              { "type": "revert", "section": "⏪ 回滚", "hidden": false }
            ]