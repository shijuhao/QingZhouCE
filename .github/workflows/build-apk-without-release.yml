name: Build Test APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Sign APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

      - name: Get commit hash
        id: commit
        run: echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get latest commit message
        id: commit_msg
        run: |
          MSG=$(git log -1 --format='%s')
          echo "msg=$MSG" >> $GITHUB_OUTPUT

      - name: Notify bot about build
        continue-on-error: true
        env:
          BOT_SEND_TOKEN_VAR: ${{ vars.YHCHAT_BOT_SEND_TOKEN }}
          BOT_SEND_TOKEN_SECRET: ${{ secrets.YHCHAT_BOT_SEND_TOKEN }}
          BOT_RECV_ID_VAR: ${{ vars.YHCHAT_BOT_RECV_ID }}
          BOT_RECV_ID_SECRET: ${{ secrets.YHCHAT_BOT_RECV_ID }}
          BOT_RECV_TYPE_VAR: ${{ vars.YHCHAT_BOT_RECV_TYPE }}
          BOT_RECV_TYPE_SECRET: ${{ secrets.YHCHAT_BOT_RECV_TYPE }}
        run: |
          BOT_SEND_TOKEN="${BOT_SEND_TOKEN_VAR:-$BOT_SEND_TOKEN_SECRET}"
          BOT_RECV_ID="${BOT_RECV_ID_VAR:-$BOT_RECV_ID_SECRET}"
          BOT_RECV_TYPE="${BOT_RECV_TYPE_VAR:-$BOT_RECV_TYPE_SECRET}"

          if [ -z "$BOT_SEND_TOKEN" ] || [ -z "$BOT_RECV_ID" ] || [ -z "$BOT_RECV_TYPE" ]; then
            echo "Skip bot notify"
            exit 0
          fi

          send_markdown() {
            local text="$1"
            local payload
            payload=$(jq -n \
              --arg recvId "$BOT_RECV_ID" \
              --arg recvType "$BOT_RECV_TYPE" \
              --arg text "$text" \
              '{
                recvId: $recvId,
                recvType: $recvType,
                contentType: "markdown",
                content: {
                  text: $text
                }
              }')

            curl --fail-with-body \
              -X POST "https://chat-go.jwzhd.com/open-apis/v1/bot/send?token=${BOT_SEND_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$payload"
          }

          send_file() {
            local file_path="$1"
            local file_name
            local upload_response
            local file_key
            local payload

            file_name=$(basename "$file_path")
            upload_response=$(curl --fail-with-body -sS \
              -X POST "https://chat-go.jwzhd.com/open-apis/v1/file/upload?token=${BOT_SEND_TOKEN}" \
              -F "file=@${file_path};filename=${file_name}") || return 1

            file_key=$(printf '%s' "$upload_response" | jq -r '.data.fileKey // empty')
            if [ -z "$file_key" ]; then
              echo "Upload did not return fileKey for ${file_name}"
              return 1
            fi

            payload=$(jq -n \
              --arg recvId "$BOT_RECV_ID" \
              --arg recvType "$BOT_RECV_TYPE" \
              --arg fileKey "$file_key" \
              '{
                recvId: $recvId,
                recvType: $recvType,
                contentType: "file",
                content: {
                  fileKey: $fileKey
                }
              }')

            curl --fail-with-body \
              -X POST "https://chat-go.jwzhd.com/open-apis/v1/bot/send?token=${BOT_SEND_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$payload"
          }

          MESSAGE="**🔨 构建完成**

**提交**: ${{ steps.commit.outputs.hash }}
**信息**: ${{ steps.commit_msg.outputs.msg }}
**触发者**: ${{ github.actor }}

**下载**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if ! send_markdown "$MESSAGE"; then
            echo "Markdown bot notification failed"
            exit 0
          fi

          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)

          if [ -n "$APK_PATH" ]; then
            APK_SIZE=$(stat -c%s "$APK_PATH")

            if [ "$APK_SIZE" -lt 20971520 ]; then
              if ! send_file "$APK_PATH"; then
                echo "Bot file send failed"
              fi
            else
              echo "APK size $(($APK_SIZE / 1048576))MB >= 20MB, sent link only"
            fi
          fi